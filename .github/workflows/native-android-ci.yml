name: Native Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - feature/native-android

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Write local.properties (Supabase keys)
        run: |
          cat > native-android/local.properties <<'EOF'
          REACT_APP_SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          REACT_APP_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          EOF

      - name: Ensure Gradle wrapper exists
        working-directory: native-android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi

      - name: Build debug APK
        working-directory: native-android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wireway-native-debug-apk
          path: native-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
