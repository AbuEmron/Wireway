name: Native Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - feature/native-android

# Needed so the build can clobber the rolling release asset (wireway-pro.apk).
permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Write local.properties (Supabase keys)
        run: |
          cat > native-android/local.properties <<'EOF'
          REACT_APP_SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          REACT_APP_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          EOF

      - name: Ensure Gradle wrapper exists
        working-directory: native-android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi

      - name: Build debug APK
        working-directory: native-android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wireway-native-debug-apk
          path: native-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Signed release AAB for Play ──────────────────────────────────────────
      # Runs only when the owner has added the upload-key secrets:
      #   WIREWAY_UPLOAD_KEYSTORE_B64 (base64 of the PWABuilder upload keystore),
      #   WIREWAY_KEYSTORE_PASSWORD, WIREWAY_KEY_ALIAS, WIREWAY_KEY_PASSWORD
      - name: Prepare upload keystore
        id: uploadkey
        env:
          KEYSTORE_B64: ${{ secrets.WIREWAY_UPLOAD_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/wireway-upload.keystore
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "Upload keystore secrets not set — skipping release AAB."
          fi

      - name: Build signed release AAB
        if: steps.uploadkey.outputs.have == 'true'
        working-directory: native-android
        env:
          WIREWAY_KEYSTORE_FILE: /tmp/wireway-upload.keystore
          WIREWAY_KEYSTORE_PASSWORD: ${{ secrets.WIREWAY_KEYSTORE_PASSWORD }}
          WIREWAY_KEY_ALIAS: ${{ secrets.WIREWAY_KEY_ALIAS }}
          WIREWAY_KEY_PASSWORD: ${{ secrets.WIREWAY_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload release AAB artifact
        if: steps.uploadkey.outputs.have == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wireway-native-release-aab
          path: native-android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Every green build refreshes the permanent download link:
      # https://github.com/AbuEmron/Wireway/releases/download/android-test-430d3a2/wireway-pro.apk
      - name: Publish APK to the rolling test release
        if: github.ref == 'refs/heads/feature/native-android'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp native-android/app/build/outputs/apk/debug/app-debug.apk wireway-pro.apk
          gh release upload android-test-430d3a2 wireway-pro.apk --clobber -R "$GITHUB_REPOSITORY"
