<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5a623" />
    <meta name="description" content="VoltQuote — Professional residential electrical estimating. Location-based pricing, NEC 2023 reference, AI quotes. Free for electricians." />

    <!-- PWA / App meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VoltQuote" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="VoltQuote" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" sizes="72x72"   href="/icons/icon-72x72.svg" />
    <link rel="apple-touch-icon" sizes="96x96"   href="/icons/icon-96x96.svg" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.svg" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.svg" />
    <link rel="apple-touch-icon"                 href="/icons/icon-192x192.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title"       content="VoltQuote — Electrical Estimator" />
    <meta property="og:description" content="Fast, professional electrical estimates for contractors across the US. Free." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://voltquote.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="VoltQuote — Electrical Estimator" />
    <meta name="twitter:description" content="Professional residential electrical estimating tool. Free for contractors." />

    <title>VoltQuote — Electrical Estimator</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; }
      body {
        background: #0a0a0f;
        font-family: Georgia, serif;
        height: 100%;
        /* Safe area insets for iPhone notch / home bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      #root { min-height: 100vh; }

      /* PWA install prompt banner */
      #install-banner {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
        border-top: 2px solid #f5a623;
        padding: 14px 20px;
        z-index: 9999;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      #install-banner.show { display: flex; }
      #install-banner p { color: #e8e0d0; font-size: 13px; font-family: Georgia, serif; flex: 1; }
      #install-banner p span { color: #f5a623; font-weight: bold; }
      #install-btn {
        background: linear-gradient(135deg, #f5a623, #e8860a);
        border: none; border-radius: 8px;
        padding: 10px 18px; cursor: pointer;
        color: #0a0a0f; font-weight: 700;
        font-size: 13px; white-space: nowrap;
        font-family: Georgia, serif;
      }
      #dismiss-btn {
        background: none; border: none;
        color: #4a4050; cursor: pointer;
        font-size: 18px; padding: 4px;
      }

      /* iOS install instructions banner */
      #ios-banner {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
        border-top: 2px solid #f5a623;
        padding: 16px 20px;
        z-index: 9999;
        text-align: center;
      }
      #ios-banner.show { display: block; }
      #ios-banner p { color: #c0b89a; font-size: 12px; font-family: Georgia, serif; line-height: 1.8; }
      #ios-banner strong { color: #f5a623; }
      #ios-close {
        background: none; border: 1px solid rgba(245,166,35,0.3);
        border-radius: 6px; color: #f5a623;
        padding: 6px 16px; cursor: pointer;
        margin-top: 10px; font-size: 12px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <noscript>VoltQuote requires JavaScript to run.</noscript>
    <div id="root"></div>

    <!-- Android/Chrome install banner -->
    <div id="install-banner">
      <p>⚡ Install <span>VoltQuote</span> on your phone — works offline!</p>
      <button id="install-btn">Install App</button>
      <button id="dismiss-btn">✕</button>
    </div>

    <!-- iOS install instructions -->
    <div id="ios-banner">
      <p>
        ⚡ Install <strong>VoltQuote</strong> on your iPhone<br/>
        Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong>
      </p>
      <button id="ios-close">Got it</button>
    </div>

    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('VoltQuote SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }

      // Android/Chrome — capture install prompt
      let deferredPrompt;
      const installBanner = document.getElementById('install-banner');
      const installBtn = document.getElementById('install-btn');
      const dismissBtn = document.getElementById('dismiss-btn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show banner after 10 seconds
        setTimeout(() => {
          if (!localStorage.getItem('vq_installed')) {
            installBanner.classList.add('show');
          }
        }, 10000);
      });

      installBtn.addEventListener('click', async () => {
        installBanner.classList.remove('show');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            localStorage.setItem('vq_installed', 'true');
          }
          deferredPrompt = null;
        }
      });

      dismissBtn.addEventListener('click', () => {
        installBanner.classList.remove('show');
        localStorage.setItem('vq_install_dismissed', 'true');
      });

      window.addEventListener('appinstalled', () => {
        localStorage.setItem('vq_installed', 'true');
        installBanner.classList.remove('show');
      });

      // iOS Safari — show manual instructions
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      const iosBanner = document.getElementById('ios-banner');
      const iosClose = document.getElementById('ios-close');

      if (isIOS && !isInStandaloneMode && !localStorage.getItem('vq_ios_dismissed')) {
        setTimeout(() => { iosBanner.classList.add('show'); }, 8000);
      }

      iosClose.addEventListener('click', () => {
        iosBanner.classList.remove('show');
        localStorage.setItem('vq_ios_dismissed', 'true');
      });
    </script>
  </body>
</html>
