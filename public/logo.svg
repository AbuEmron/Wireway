<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111128;stop-opacity:1"/>
    </linearGradient>

    <!-- Gold gradient for bolt -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9c846;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#f5a623;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e07c0a;stop-opacity:1"/>
    </linearGradient>

    <!-- Gold gradient for text accent -->
    <linearGradient id="voltGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9c846;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1"/>
    </linearGradient>

    <!-- Glow filter for bolt -->
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for icon circle -->
    <filter id="circleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#f5a623" flood-opacity="0.3"/>
    </filter>

    <!-- Circuit line clip -->
    <clipPath id="iconClip">
      <circle cx="72" cy="80" r="46"/>
    </clipPath>

    <!-- Tagline gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a7060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a5048;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.04">
    <line x1="0" y1="32" x2="480" y2="32" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="0" y1="64" x2="480" y2="64" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="480" y2="96" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="480" y2="128" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="160" stroke="#f5a623" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="160" stroke="#f5a623" stroke-width="0.5"/>
  </g>

  <!-- Accent top border line -->
  <rect x="0" y="0" width="480" height="3" rx="2" fill="url(#voltGrad)" opacity="0.9"/>

  <!-- Icon circle background -->
  <circle cx="72" cy="80" r="46" fill="#1a1a2e" filter="url(#circleGlow)" opacity="0.95"/>
  <circle cx="72" cy="80" r="46" fill="none" stroke="url(#boltGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="72" cy="80" r="38" fill="none" stroke="url(#boltGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Circuit nodes decorative -->
  <circle cx="72" cy="38" r="2.5" fill="#f5a623" opacity="0.4"/>
  <circle cx="72" cy="122" r="2.5" fill="#f5a623" opacity="0.4"/>
  <circle cx="30" cy="80" r="2.5" fill="#f5a623" opacity="0.4"/>
  <circle cx="114" cy="80" r="2.5" fill="#f5a623" opacity="0.4"/>

  <!-- Circuit tick marks -->
  <line x1="72" y1="34" x2="72" y2="40" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="72" y1="120" x2="72" y2="126" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="26" y1="80" x2="34" y2="80" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="110" y1="80" x2="118" y2="80" stroke="#f5a623" stroke-width="1" opacity="0.3"/>

  <!-- Lightning bolt — main icon -->
  <!-- Bold, geometric, centered in circle -->
  <g filter="url(#boltGlow)">
    <polygon
      points="80,34 56,82 70,82 64,126 92,72 76,72 86,34"
      fill="url(#boltGrad)"
      stroke="none"
    />
    <!-- Inner highlight on bolt -->
    <polygon
      points="80,34 72,62 76,62 72,82 78,62 74,62"
      fill="#fce98a"
      opacity="0.5"
    />
  </g>

  <!-- Vertical divider -->
  <line x1="134" y1="44" x2="134" y2="116" stroke="#f5a623" stroke-width="0.75" opacity="0.25"/>

  <!-- VOLT — large display text -->
  <text
    x="154"
    y="98"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#voltGrad)"
    filter="url(#textShadow)"
  >VOLT</text>

  <!-- QUOTE — same size, white -->
  <text
    x="290"
    y="98"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="400"
    letter-spacing="-1"
    fill="#ffffff"
    opacity="0.92"
  >QUOTE</text>

  <!-- Dot separator between VOLT and QUOTE -->
  <circle cx="283" cy="80" r="4" fill="#f5a623" opacity="0.7"/>

  <!-- Tagline -->
  <text
    x="154"
    y="120"
    font-family="'Courier New', Courier, monospace"
    font-size="10.5"
    letter-spacing="3.5"
    fill="url(#tagGrad)"
  >RESIDENTIAL ELECTRICAL ESTIMATOR</text>

  <!-- Bottom-right NEC badge -->
  <rect x="398" y="118" width="66" height="20" rx="4" fill="rgba(245,166,35,0.1)" stroke="rgba(245,166,35,0.35)" stroke-width="1"/>
  <text x="431" y="132" font-family="'Courier New', Courier, monospace" font-size="9" fill="#f5a623" text-anchor="middle" letter-spacing="1">NEC 2023</text>

  <!-- Small US badge -->
  <rect x="398" y="94" width="66" height="20" rx="4" fill="rgba(85,136,224,0.1)" stroke="rgba(85,136,224,0.3)" stroke-width="1"/>
  <text x="431" y="108" font-family="'Courier New', Courier, monospace" font-size="9" fill="#7aa8f0" text-anchor="middle" letter-spacing="1">US PRICING</text>

</svg>
