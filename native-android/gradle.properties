# JVM args for the Gradle daemon — generous heap for AGP + Compose builds.
# 4 GB: D8 dex-merging intermittently OOM'd at 2 GB on CI runners.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# AndroidX is required by every modern AndroidX/Compose dependency.
android.useAndroidX=true

# Kotlin code style for the formatter.
kotlin.code.style=official

# Only generate the resources/BuildConfig for the variants we build.
android.nonTransitiveRClass=true
